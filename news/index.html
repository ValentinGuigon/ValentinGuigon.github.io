blic reporting under severe time pressure",section:"Posts",handler:()=>{window.location.href="/posts/2026-03-20-2026-03-20-35-days-to-build-a-march-madness-forecasting-system/"}},{id:"post-neuroscience-2035-the-future-of-neuroscience-is-integrative",title:"Neuroscience 2035: The future of neuroscience is integrative",description:"The previous decade (2015&amp;#8211;2025) was busy building tools, methods, and diagnoses. This new decade will be about integrating across levels of description, species, and data modalities.",section:"Posts",handler:()=>{window.location.href="/posts/2026-03-08-2026-03-08-neuroscience-2035-the-future-of-neuroscience-is-integrative/"}},{id:"post-better-judgments-how-ai-forecasting-abilities-will-reshape-human-metacognition",title:"Better Judgments: How AI forecasting abilities will reshape human metacognition",description:"In 2027, is it still worth bothering with human judgment?",section:"Posts",handler:()=>{window.location.href="/posts/2026-02-23-2026-02-23-better-judgments-how-ai-forecasting-abilities-will-reshape-human-metacognition/"}},{id:"post-better-judgments-what-good-judgments-are-missing",title:"Better Judgments: What good judgments are missing",description:"In 2026, are we still evaluating the world the right way?",section:"Posts",handler:()=>{window.location.href="/posts/2026-02-21-2026-02-21-better-judgments-what-good-judgments-are-missing/"}},{id:"post-intelligence-is-easy-cognition-is-hard",title:"Intelligence is easy; cognition is hard",description:"Distinguishing intelligent systems from cognitive systems",section:"Posts",handler:()=>{window.location.href="/posts/2026-01-24-2026-01-24-intelligence-is-easy-cognition-is-hard/"}},{id:"post-the-mind-the-brain-and-the-network",title:"The mind, the brain and the network ",description:"What&#39;s modular? Learning under topological constraints",section:"Posts",handler:()=>{window.location.href="/posts/2025-10-14-2025-10-14-the-mind-the-brain-and-the-network/"}},{id:"post-can-machines-think-2-0",title:"Can machines think? 2.0",description:"Assessing machine vs human cognition in a game of Baseball-Poker",section:"Posts",handler:()=>{window.location.href="/posts/2025-09-06-2025-09-06-can-machines-think-20/"}},{id:"post-neuroscience-2035-what-the-next-decade-looks-like",title:"Neuroscience 2035: What the next decade looks like",description:"The previous decade (2015-2025) has been busy building tools, methods, and diagnoses. This new decade will be integrative.",section:"Posts",handler:()=>{window.location.href="/posts/2025-08-27-2025-08-27-neuroscience-2035-what-the-next-decade-looks-like/"}},{id:"post-ai-agents-in-the-lab-concept-paper",title:"AI Agents in the Lab: Concept Paper",description:"",section:"Posts",handler:()=>{window.location.href="/articles/2025-05-08-ai-agents-in-the-lab-concept-paper/"}},{id:"post-the-public-sphere-is-not-a-collection-of-echo-chambers",title:"The public sphere is not a collection of echo chambers",description:"On the public sphere, echo chambers, mistaking one for another, the role of polarization, and the causes of noise when listening to networks.",section:"Posts",handler:()=>{window.location.href="/posts/2025-03-21-2025-03-21-the-public-sphere-is-not-a-collection-of-echo-chambers/"}},{id:"post-coming-soon",title:"Coming soon",description:"Hi, I&amp;#8217;m starting a Substack.",section:"Posts",handler:()=>{window.location.href="/posts/2025-03-19-2025-03-19-coming-soon/"}},{id:"post-workflow-for-a-reproducible-research",title:"Workflow for a Reproducible Research",description:"",section:"Posts",handler:()=>{window.location.href="/articles/2024-11-03-workflow-for-a-reproducible-research/"}},{id:"post-reproducibility-in-research-a-practical-guide-2-3-a-workflow-for-a-reproducible-research",title:"Reproducibility in Research, a practical guide (2/3): A workflow for a Reproducible Research",description:"",section:"Posts",handler:()=>{window.location.href="/articles/2024-11-03-reproducibility-in-research-a-practical-guide-23-a-workflow-for-a-reproducible-research/"}},{id:"post-reproducibility-in-academic-research-1-3-key-components-of-a-reproducible-research",title:"Reproducibility in academic research (1/3): Key components of a Reproducible Research",description:"",section:"Posts",handler:()=>{window.location.href="/articles/2024-07-02-reproducibility-in-academic-research-13-key-components-of-a-reproducible-research/"}},{id:"news-the-website-is-now-live",title:"The website is now live.",description:"",section:"News"},{id:"projects-ai-research-feedback",title:"AI-research-feedback",description:"A collection of Claude Code skills for academic research review. These tools were developed by Claes B\xe4ckman (economics). I modified them for cog/neuro science. It is useful to compare regenerated results from a replication package against a manuscript draft, or to simulate feedbacks.",section:"Projects",handler:()=>{window.location.href="/projects/ai_research_feedback/"}},{id:"projects-ten-simple-rules-for-achieving-computational-reproducibility-in-neuroscience",title:"Ten simple rules for achieving computational reproducibility in neuroscience",description:"Gaurav Mahajan and I are formalizing the infrastructures we built for the UMD SLD Lab into 10 simple rules for achieving computational reproducibility in neuroscience. We emphasize simple, low-cost decisions that can be implemented early and scaled as projects become more complex. The manuscript comes with a companion document specifying codelines to implement each rule.",section:"Projects",handler:()=>{window.location.href="/projects/computational_reproducibility/"}},{id:"projects-sex-money-testosterone-causes-ofc-amygdala-decoupling",title:"Sex-Money - Testosterone Causes OFC-Amygdala Decoupling",description:"We hypothesized that testosterone administration may: 1) increase posterior lateral orbitofrontal cortex activity, previously observed to be engaged more with erotic as compared to monetary rewards in healthy young men; (2) decrease the functional coupling between the medial part of the orbitofrontal cortex and the amygdala while anticipating rewards. I showed that testosterone specifically increased incentive behavior related to erotic stimuli as compared to monetary rewards; that this behavioral interaction effect was associated with a higher association between the relative motivational value for erotic as compared to monetary cues in the ventral striatum; and that testosterone injection reduced the functional coupling between the ventromedial prefrontal cortex and the amygdala while anticipating both primary and secondary rewards, showing testosterone affects limbic-prefrontal connectivity during reward processing.",section:"Projects",handler:()=>{window.location.href="/projects/connectivity_testosterone/"}},{id:"projects-cookiecutter-neuro-research-project",title:"Cookiecutter Neuro Research Project",description:"Created a cookiecutter template for psyc/neuro research. It&#39;s a reusable scaffold for starting new research projects with a clearer architecture from the outset. The template is oriented toward computational neuroscience work and is designed to make setup, organization, and handoff of analysis projects across Python, R, and MATLAB-based workflows. Highly recommended to initialize any research project.",section:"Projects",handler:()=>{window.location.href="/projects/cookiecutter_neuro_research_project/"}},{id:"projects-fmri-fitlins-templates",title:"fMRI Fitlins Templates",description:"Built reusable templates for fMRI interactive and slurm work using Python-based fitlins pipelines. Packages analysis, logging and plotting using nilearn and fitlins wrappers.",section:"Projects",handler:()=>{window.location.href="/projects/fmri_fitlins_templates/"}},{id:"projects-fmri-spm-templates",title:"fMRI SPM Templates",description:"Built reusable templates for fMRI work: SPM-based pipelines for analysis structure, preprocessing logic, and project setup.",section:"Projects",handler:()=>{window.location.href="/projects/fmri_spm_templates/"}},{id:"projects-fmriprep-qc-guide-and-logging",title:"fMRIPrep QC guide and logging",description:"Designed a guide and a logging system for assessing quality of data preprocessed using fMRIPrep.",section:"Projects",handler:()=>{window.location.href="/projects/fmriprep_qc/"}},{id:"projects-march-madness-2026-forecasting-engine",title:"March Madness 2026 Forecasting Engine",description:"Built an end-to-end public-facing prediction and diagnostics engine for the 2026 NCAA tournament. Fetched BartTorvik, WarrenNolan and NCAA historic data, tested predicting models, created brackets portfolio, and diagnosed predictions after each round. It was built in 3.5 days using an earlier version of SUPLEX.",section:"Projects",handler:()=>{window.location.href="/projects/march_madness_2026/"}},{id:"projects-neurodesign-plus",title:"Neurodesign-plus",description:"Developed an open-source python package to optimize fMRI design in typical complex, decision-making experimental setups. I led the project and Atharv Umap did the heavy coding work. The package Addresses shortcomings in existing solutions for optimizing trial or time allocation during design; allows specifying intricate, random or path-dependent designs. It is built on top of Poldrack lab&#39;s neurodesign.",section:"Projects",handler:()=>{window.location.href="/projects/neurodesign_plus/"}},{id:"projects-polarization-and-social-learning-in-social-network",title:"Polarization and social learning in social network",description:"I initialized a study on the formation of beliefs in social networks with Jean-Claude Dreher, Frederic Moisan and Alain Barrat. Ga\xebl Carniel is now conducting the study. At the collective level, the behavior of each individual contributes to the evolution of the architecture of social networks in which we are embedded. In turn, those networks affect the beliefs we form about the state of the world. With this study, our main objective is to investigate how information propagation impacts the formation of consensus/dissensus/polarization, reflected by the formation of communities, and the role of social learning in large groups.",section:"Projects",handler:()=>{window.location.href="/projects/polarization_social_network/"}},{id:"projects-receivingnews-modeling-information-seeking-post-news-evaluation",title:"ReceivingNews - Modeling Information-seeking Post News Evaluation",description:"Project ReceivingNews (Metacognition biases information seeking in assessing ambiguous news, published in Communications Psychology) in which we show that humans have limited metacognitive ability when facing ambiguous news; that this metacognition drives information-seeking; and that news ambiguity (news content imprecision and propensity to polarize opinions) explain against any other variable individuals&#39; likelihood of misjudgment. Our results underscore the importance of metacognitive abilities in mediating the relationship between assessing ambiguous information and the decision to seek or avoid more information.",section:"Projects",handler:()=>{window.location.href="/projects/receivingnews_replication_package/"}},{id:"projects-sendingnews-neurocomputational-mechanisms-of-infering-others-39-preferences-for-information",title:"SendingNews - Neurocomputational Mechanisms of Infering Others&#39; Preferences For Information",description:"Project SendingNews (Neurocomputational mechanisms of sharing debunking information about ambiguous news) in which we show that humans infer others&#39; preferences for information with a Bayesian updating rule that integrates first-order beliefs about news accuracy with second-order beliefs about recipients\u2019 preferences. Second-order beliefs specifically include inferences from both social distance and learning about Receivers\u2019 general reception tendencies. Neuroimaging results reveal that the ventromedial prefrontal cortex tracked first-order beliefs while the temporoparietal junction and dorsomedial prefrontal cortex tracked second-order beliefs.",section:"Projects",handler:()=>{window.location.href="/projects/sendingnews_modeling/"}},{id:"projects-suplex-agentic-workflow",title:"SUPLEX-agentic-workflow",description:"Developed a control layer for bounded LLM-assisted repository work, built around explicit handoffs, execution reports, scoped task boundaries, and continuity artifacts. It is used to structure changes so delegation of tasks to LLMs does not erase provenance, scope discipline, or reviewability. Now used in each of my most complex projects.",section:"Projects",handler:()=>{window.location.href="/projects/suplex_agentic_workflow/"}},{id:"projects-individual-differences-in-dynamic-belief-updating-during-trust-learning",title:"Individual Differences In Dynamic Belief Updating During Trust Learning",description:"Trust is defined as the willingness to be vulnerable to another being on the basis ofpositive expectations of their intentions and behaviors. In repeated interactions, learning to trust others involves cognitive processes that integrate uncertainty, context, and potential betrayal. Different strategies can guide trust behavior, such as heuristics, learning, or beliefs updating. Individuals differ in how they deploy cognitive processes, which may impact their strategies. In a dynamic trust learning task that can be solved using a variety of strategies, we characterize systematically this heterogeneity, identifying different profiles of participants mobilizing different cognitive processes.",section:"Projects",handler:()=>{window.location.href="/projects/trust_dynamic_learning/"}},{id:"projects-neurocomputational-mechanisms-of-social-learning",title:"Neurocomputational Mechanisms of Social Learning",description:"Social learning is crucial for acquiring knowledge about the world, deciding how to act in social situations and learning consequences of actions without direct experience. Yet social learning vary widely across individuals, including in disorders associated with deficits in social function, such as autism and social anxiety. We need a robust characterization at the individual level. In a large-scale fMRI study, we seek to better characterize this heterogeneity in processes and brain correlates. We use a social learning battery that crosses sociality and importance of learning across tasks of risk/ambiguity, trust learning and observational learning.",section:"Projects",handler:()=>{window.location.href="/projects/trust_dynamic_learning_fmri/"}},{id:"projects-personal-website",title:"Personal Website",description:"The site you are reading: a Jekyll (built from al-folio) research-facing website.",section:"Projects",handler:()=>{window.location.href="/projects/website/"}},{id:"teaching-nsco-doctorate-school-fmri-course",title:"NSCO Doctorate school fMRI course",description:"Preprocessing and statistical analysis of fMRI data with SPM12",section:"Teaching",handler:()=>{window.location.href="/teaching/2023_NSCO_fMRI_course/"}},{id:"teaching-ecole-douteuse-cours-1",title:"Ecole douteuse: Cours 1",description:"Traitement d&#39;informations",section:"Teaching",handler:()=>{window.location.href="/teaching/2025_Cortecs_Cours_1/"}},{id:"teaching-ecole-douteuse-cours-2",title:"Ecole douteuse: Cours 2",description:"Croyances",section:"Teaching",handler:()=>{window.location.href="/teaching/2025_Cortecs_Cours_2/"}},{id:"teaching-ecole-douteuse-cours-3",title:"Ecole douteuse: Cours 3",description:"Le raisonnement et ses limites",section:"Teaching",handler:()=>{window.location.href="/teaching/2025_Cortecs_Cours_3/"}},{id:"teaching-ecole-douteuse-cours-4",title:"Ecole douteuse: Cours 4",description:"Evaluer des informations complexes",section:"Teaching",handler:()=>{window.location.href="/teaching/2025_Cortecs_Cours_4/"}},{id:"teaching-ecole-douteuse-cours-5",title:"Ecole douteuse: Cours 5",description:"Bruit",section:"Teaching",handler:()=>{window.location.href="/teaching/2025_Co
